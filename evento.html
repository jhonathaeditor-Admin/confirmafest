<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ConfirmaFest — Evento</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#0A0807;color:#F3ECE0;font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  *{box-sizing:border-box;}
  button,input,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid #C9A662;outline-offset:3px;}
  .tab{background:none;border:none;padding:14px 4px;min-height:48px;cursor:pointer;font:600 11px/1 Inter,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#8F8271;border-bottom:2px solid transparent;transition:all .2s;}
  .tab:hover{color:#C9A662;}
  .tab.on{color:#F5D89B;border-bottom-color:#C9A662;}
  .card{background:linear-gradient(180deg,#1B150E,#17120D);border:1px solid rgba(201,166,98,.18);border-radius:8px;box-shadow:inset 0 1px 0 rgba(245,216,155,.05),0 16px 40px rgba(0,0,0,.35);}
  .kpi{padding:20px;border-radius:8px;border:1px solid rgba(201,166,98,.18);background:linear-gradient(180deg,#1B150E,#17120D);cursor:pointer;text-align:left;transition:all .2s;}
  .kpi:hover{border-color:rgba(201,166,98,.45);}
  .kpi[aria-pressed="true"]{border-color:#C9A662;box-shadow:0 0 0 1px rgba(201,166,98,.35),0 0 24px rgba(201,166,98,.12);}
  .inp{width:100%;padding:13px 15px;background:rgba(23,18,13,.75);border:1px solid rgba(201,166,98,.22);border-radius:6px;color:#F3ECE0;font-size:15px;}
  .inp::placeholder{color:#8F8271;}
  .btn{border:1px solid rgba(201,166,98,.35);background:transparent;color:#C9A662;border-radius:4px;padding:0 16px;min-height:42px;cursor:pointer;font:600 11px/1 Inter,sans-serif;letter-spacing:.12em;text-transform:uppercase;}
  .btn:hover{background:rgba(201,166,98,.1);}
  .btn-p{border:none;background:linear-gradient(115deg,#9a7a3c,#C9A662 35%,#F5D89B 52%,#C9A662 68%,#9a7a3c);color:#191007;border-radius:4px;padding:0 22px;min-height:46px;cursor:pointer;font:600 11px/1 Inter,sans-serif;letter-spacing:.16em;text-transform:uppercase;}
  .chip{padding:5px 10px;border-radius:99px;font:600 9px/1 Inter,sans-serif;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
  .c-ok{border:1px solid rgba(127,194,155,.45);background:rgba(30,69,52,.35);color:#A7D9BF;}
  .c-no{border:1px solid rgba(197,110,92,.45);background:rgba(161,77,63,.12);color:#E0A294;}
  .c-pd{border:1px solid rgba(201,166,98,.35);background:rgba(201,166,98,.08);color:#C9A662;}
  @media(max-width:620px){.kpis{grid-template-columns:repeat(2,1fr)!important;}}
</style>
</head>
<body>
<div id="app" style="min-height:100vh;"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://qmxldxvkkhpvimjkgqvz.supabase.co';
const SUPABASE_KEY='sb_publishable_OzsFX2OvynXqeVLkLcPCgA_P3t8Ej0v';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const SLUG=new URLSearchParams(location.search).get('ev')||'';
const app=document.getElementById('app');
const gold='background:linear-gradient(100deg,#C9A662,#F5D89B 55%,#C9A662);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const dig=s=>(s||'').replace(/\D/g,'');

let S={papel:'assessora',perm:{},aba:'painel',ev:null,fams:[],busca:'',filtro:'total',loading:true,erro:'',addOpen:false,saved:false,criando:false,perms:null,disp:null,intervalo:8,
  cfg:{min:8,max:25,lote:20,pausaMin:15,ritmo:'seguro'}};

async function carregar(){
  const {data:sess}=await sb.auth.getSession();
  if(!sess.session){ location.href='index.html'; return; }
  try{
    // descobre o papel: se o login for de noivos, carrega as permissões
    const {data:nv}=await sb.rpc('meu_evento_noivos');
    if(nv&&nv.length){
      S.papel='noivos';
      S.perm={painel:nv[0].ver_painel,detalhes:nv[0].editar_detalhes,convidados:nv[0].gerenciar_convidados,
              disparar:nv[0].disparar,rsvp:nv[0].abrir_fechar_rsvp,telefones:nv[0].ver_telefones};
    }
    const {data,error}=await sb.rpc('evento_detalhe',{p_slug:SLUG});
    if(error) throw error;
    if(!data||!data.length){ S.erro='Evento não encontrado.'; S.loading=false; r(); return; }
    const e=data[0];
    S.ev={id:e.evento_id,casal:e.casal,data:e.data_evento,hora:e.hora_evento,local:e.local,msg:e.mensagem_convite,status:e.status,rsvp:e.rsvp_aberto,limite:e.data_limite,slug:e.slug};
    const map={};
    data.forEach(x=>{
      if(!x.responsavel_id) return;
      if(!map[x.responsavel_id]) map[x.responsavel_id]={id:x.responsavel_id,nome:x.resp_nome,tel:x.telefone,pessoas:[]};
      if(x.pessoa_id) map[x.responsavel_id].pessoas.push({id:x.pessoa_id,nome:x.pessoa_nome,resp:x.eh_responsavel,st:x.status_presenca,quando:x.respondido_em});
    });
    S.fams=Object.values(map); await carregarPerms(); S.loading=false; r();
  }catch(err){ console.error(err); S.erro='Erro ao carregar o evento.'; S.loading=false; r(); }
}

function todas(){ return S.fams.flatMap(f=>f.pessoas.map(p=>({...p,fam:f}))); }
function cont(){ const t=todas(); return {total:t.length,ok:t.filter(p=>p.st==='confirmado').length,pd:t.filter(p=>p.st==='pendente').length,no:t.filter(p=>p.st==='nao_vai').length}; }

function famsFiltradas(){
  const q=norm(S.busca), qd=dig(S.busca);
  return S.fams.map(f=>{
    let ps=f.pessoas;
    if(S.filtro!=='total') ps=ps.filter(p=>p.st===(S.filtro==='ok'?'confirmado':S.filtro==='pd'?'pendente':'nao_vai'));
    if(q){
      const famBate=norm(f.nome).includes(q)||(qd&&dig(f.tel).includes(qd));
      if(!famBate) ps=ps.filter(p=>norm(p.nome).includes(q)||norm(({confirmado:'confirmado',pendente:'pendente',nao_vai:'nao vai'})[p.st]).includes(q));
    }
    return {...f,pessoas:ps,vazia:f.pessoas.length===0};
  }).filter(f=>f.pessoas.length>0||f.vazia);
}

// ---------- ações ----------
async function salvarCampo(campo,valor){
  try{ const u={}; u[campo]=valor||null;
    const {error}=await sb.from('eventos').update(u).eq('id',S.ev.id);
    if(error) throw error; S.saved=true; r(); setTimeout(()=>{S.saved=false;r();},2000);
  }catch(e){ alert('Não foi possível salvar.'); }
}
async function addConvidado(){
  const nome=(document.getElementById('a-nome')||{}).value||'';
  const tel=(document.getElementById('a-tel')||{}).value||'';
  const deps=((document.getElementById('a-deps')||{}).value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!nome.trim()||!dig(tel)){ alert('Preencha nome e WhatsApp.'); return; }
  try{
    // se existir um responsável órfão (sem pessoas) com este telefone, remove antes
    const {data:orf}=await sb.from('responsaveis').select('id,pessoas(id)').eq('evento_id',S.ev.id).eq('telefone',dig(tel));
    if(orf&&orf.length){
      for(const o of orf){ if(!o.pessoas||o.pessoas.length===0){ await sb.from('responsaveis').delete().eq('id',o.id); } }
    }
    const {data:rr,error:e1}=await sb.from('responsaveis').insert({evento_id:S.ev.id,nome:nome.trim(),telefone:dig(tel)}).select().single();
    if(e1) throw e1;
    const rows=[{responsavel_id:rr.id,nome:nome.trim(),eh_responsavel:true,status_presenca:'pendente'}]
      .concat(deps.map(d=>({responsavel_id:rr.id,nome:d,eh_responsavel:false,status_presenca:'pendente'})));
    const {error:e2}=await sb.from('pessoas').insert(rows);
    if(e2) throw e2;
    S.addOpen=false; await carregar();
  }catch(e){ console.error(e);
    const m=String(e.message||e);
    alert(m.includes('duplicate')||m.includes('unique')
      ? 'Este telefone já está cadastrado neste evento. Procure por ele na lista.'
      : 'Erro ao adicionar: '+m);
  }
}
async function excluirFam(id,nome){
  if(!confirm('Excluir '+nome+' e seus dependentes? Esta ação não pode ser desfeita.')) return;
  try{ const {error}=await sb.from('responsaveis').delete().eq('id',id); if(error) throw error; await carregar(); }
  catch(e){ alert('Erro ao excluir.'); }
}
async function excluirPessoa(id,nome){
  // descobre a família dessa pessoa
  const fam=S.fams.find(f=>f.pessoas.some(p=>p.id===id));
  const ultima = fam && fam.pessoas.length===1;
  const msg = ultima
    ? 'Excluir '+nome+'?\n\nComo é a última pessoa desta família, o responsável e o telefone também serão removidos.'
    : 'Excluir '+nome+'?';
  if(!confirm(msg)) return;
  try{
    const {error}=await sb.from('pessoas').delete().eq('id',id);
    if(error) throw error;
    if(ultima && fam){ await sb.from('responsaveis').delete().eq('id',fam.id); }
    await carregar();
  }catch(e){ console.error(e); alert('Erro ao excluir: '+(e.message||e)); }
}

function copiar(t){ navigator.clipboard.writeText(t); alert('Link copiado!'); }

// ---------- gestão ----------
async function setStatus(v){
  const u={status:v};
  if(v==='encerrado'||v==='arquivado') u.rsvp_aberto=false;
  if(v==='ativo') u.rsvp_aberto=true;
  try{ const {error}=await sb.from('eventos').update(u).eq('id',S.ev.id); if(error) throw error;
    S.ev.status=v; if(u.rsvp_aberto!==undefined) S.ev.rsvp=u.rsvp_aberto; r();
  }catch(e){ alert('Erro ao mudar o status.'); }
}
async function setRsvp(v){
  try{ const {error}=await sb.from('eventos').update({rsvp_aberto:v}).eq('id',S.ev.id); if(error) throw error; S.ev.rsvp=v; r(); }
  catch(e){ alert('Erro ao mudar as confirmações.'); }
}
async function setLimite(v){
  try{ const {error}=await sb.from('eventos').update({data_limite:v||null}).eq('id',S.ev.id); if(error) throw error; S.ev.limite=v; S.saved=true; r(); setTimeout(()=>{S.saved=false;r();},2000); }
  catch(e){ alert('Erro ao salvar a data-limite.'); }
}
async function carregarPerms(){
  try{ const {data}=await sb.from('permissoes_noivos').select('*').eq('evento_id',S.ev.id).maybeSingle(); S.perms=data||null; }
  catch(e){ S.perms=null; }
}
async function salvarPerms(){
  const nome=(document.getElementById('p-nome')||{}).value||'';
  const email=((document.getElementById('p-user')||{}).value||'').trim().toLowerCase();
  const p={
    evento_id:S.ev.id, nome:nome.trim()||null, email:email||null,
    pode_ver_painel:!!document.getElementById('k1').checked,
    pode_editar_detalhes:!!document.getElementById('k2').checked,
    pode_gerenciar_convidados:!!document.getElementById('k3').checked,
    pode_disparar:!!document.getElementById('k4').checked,
    pode_abrir_fechar_rsvp:!!document.getElementById('k5').checked,
    pode_ver_telefones:!!document.getElementById('k6').checked
  };
  try{
    if(S.perms&&S.perms.id){ const {error}=await sb.from('permissoes_noivos').update(p).eq('id',S.perms.id); if(error) throw error; }
    else { const {error}=await sb.from('permissoes_noivos').insert(p); if(error) throw error; }
    await carregarPerms(); S.saved=true; r(); setTimeout(()=>{S.saved=false;r();},2000);
  }catch(e){ console.error(e); alert('Erro ao salvar as permissões.'); }
}
async function excluirEvento(){
  if(!confirm('Excluir o evento "'+S.ev.casal+'"?\n\nTODOS os convidados e confirmações serão apagados. Esta ação NÃO pode ser desfeita.')) return;
  if(!confirm('Tem certeza absoluta? Digite mentalmente: isto é definitivo.')) return;
  try{ const {error}=await sb.from('eventos').delete().eq('id',S.ev.id); if(error) throw error; location.href='index.html'; }
  catch(e){ alert('Erro ao excluir o evento.'); }
}

// ---------- render ----------
function chip(st){ return st==='confirmado'?'<span class="chip c-ok">Confirmado</span>':st==='nao_vai'?'<span class="chip c-no">Não vai</span>':'<span class="chip c-pd">Pendente</span>'; }
function fmtD(d){ if(!d)return'—'; const[a,m,x]=d.split('-'); const ms=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']; return x+' '+ms[+m-1]+' '+a; }
function faltam(d){ if(!d)return''; const n=Math.ceil((new Date(d+'T00:00:00')-new Date())/86400000); return n<0?'Realizado':n===0?'É hoje!':n===1?'Falta 1 dia':'Faltam '+n+' dias'; }

function listaHTML(){
  const fs=famsFiltradas();
  const nP=fs.reduce((a,f)=>a+f.pessoas.length,0);
  if(!fs.length) return '<div style="padding:44px;text-align:center;border:1px dashed rgba(201,166,98,.22);border-radius:8px;"><p style="margin:0 0 12px;font:400 15px/1.6 Inter,sans-serif;color:#8F8271;">Ninguém encontrado com esses termos.</p><button class="btn" onclick="limpar()">Limpar busca e filtros</button></div>';
  let h='<p aria-live="polite" style="margin:0 0 12px;font:400 12px/1 Inter,sans-serif;color:#8F8271;">'+nP+' pessoa'+(nP!==1?'s':'')+' · '+fs.length+' família'+(fs.length!==1?'s':'')+'</p>';
  fs.forEach(f=>{
    h+='<div class="card" style="padding:18px;margin-bottom:12px;">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(201,166,98,.12);">'
      +'<div><p style="margin:0;font:400 18px/1.3 Fraunces,serif;color:#F5D89B;">'+esc(f.nome)+'</p>'
      +'<p style="margin:3px 0 0;font:400 12px/1 Inter,sans-serif;color:#8F8271;">'+(S.papel==='noivos'&&!S.perm.telefones?'(••) •••••-••••':esc(f.tel))+' · '+f.pessoas.length+' pessoa'+(f.pessoas.length!==1?'s':'')+'</p></div>'
      +((S.papel==='noivos'&&!S.perm.convidados)?'':'<button class="btn" style="border-color:rgba(197,110,92,.4);color:#E0A294;min-height:36px;padding:0 12px;" onclick="excluirFam(\''+f.id+'\',\''+esc(f.nome).replace(/'/g,"")+'\')">Excluir</button>')+'</div>';
    if(!f.pessoas.length){ h+='<p style="margin:0;padding:10px 12px;background:rgba(161,77,63,.1);border-left:2px solid #A14D3F;border-radius:3px;font:400 12px/1.5 Inter,sans-serif;color:#E0A294;">Sem pessoas cadastradas. Exclua para liberar o telefone '+esc(f.tel)+'.</p>'; }
    f.pessoas.forEach(p=>{
      h+='<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;'+(p.resp?'':'padding-left:16px;border-left:2px solid rgba(201,166,98,.2);margin-left:2px;')+'">'
        +'<div><span style="font:500 15px/1.3 Inter,sans-serif;color:#F3ECE0;">'+esc(p.nome)+'</span>'
        +'<span style="display:block;font:600 9px/1.3 Inter,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:'+(p.resp?'#C9A662':'#8F8271')+';margin-top:2px;">'+(p.resp?'Responsável':'Dependente')+'</span></div>'
        +'<div style="display:flex;align-items:center;gap:8px;">'+chip(p.st)
        +((S.papel==='noivos'&&!S.perm.convidados)?'':'<button class="btn" style="border-color:rgba(197,110,92,.3);color:rgba(224,162,148,.8);min-height:32px;padding:0 9px;font-size:9px;" onclick="excluirPessoa(\''+p.id+'\',\''+esc(p.nome).replace(/'/g,"")+'\')">×</button>')+'</div></div>';
    });
    h+='</div>';
  });
  return h;
}

function buscaHTML(){
  return '<div style="display:flex;gap:10px;margin-bottom:14px;">'
    +'<input class="inp" id="q" value="'+esc(S.busca)+'" oninput="onBusca(this.value)" placeholder="Buscar por nome, família, telefone ou status...">'
    +(S.busca?'<button class="btn" onclick="limpar()">Limpar</button>':'')+'</div>';
}

function kpisHTML(){
  const c=cont();
  const k=(id,n,l,cor)=>'<button class="kpi" aria-pressed="'+(S.filtro===id)+'" onclick="setFiltro(\''+id+'\')"><span style="display:block;font:400 30px/1 Fraunces,serif;color:'+cor+';">'+n+'</span><span style="display:block;font:600 9px/1 Inter,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#8F8271;margin-top:6px;">'+l+'</span></button>';
  return '<div class="kpis" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;">'
    +k('ok',c.ok,'Confirmados','#A7D9BF')+k('pd',c.pd,'Pendentes','#C9A662')+k('no',c.no,'Não vão','#E0A294')+k('total',c.total,'Total','#F3ECE0')+'</div>';
}

function abaPainel(){
  const c=cont(); const pct=c.total?Math.round(((c.ok+c.no)/c.total)*100):0;
  return kpisHTML()
    +'<div class="card" style="padding:18px;margin-bottom:18px;"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="font:400 14px/1 Inter,sans-serif;color:#F3ECE0;">'+pct+'% dos convidados já responderam</span><span style="font:400 12px/1 Inter,sans-serif;color:#8F8271;">'+(c.ok+c.no)+' de '+c.total+'</span></div>'
    +'<div style="height:5px;background:rgba(201,166,98,.12);border-radius:99px;overflow:hidden;"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#9a7a3c,#F5D89B);border-radius:99px;"></div></div></div>'
    +buscaHTML()+listaHTML();
}

function abaConvidados(){
  const add=S.addOpen?'<div class="card" style="padding:20px;margin-bottom:16px;"><p style="margin:0 0 14px;font:400 18px/1 Fraunces,serif;color:#F5D89B;">Adicionar convidado</p>'
    +'<div style="display:flex;flex-direction:column;gap:10px;">'
    +'<input class="inp" id="a-nome" placeholder="Nome do responsável">'
    +'<input class="inp" id="a-tel" placeholder="WhatsApp com DDD (ex: 5521996140032)">'
    +'<input class="inp" id="a-deps" placeholder="Dependentes separados por vírgula (opcional)">'
    +'<div style="display:flex;gap:10px;margin-top:4px;"><button class="btn-p" onclick="addConvidado()">Salvar</button><button class="btn" onclick="toggleAdd(false)">Cancelar</button></div></div></div>':'';
  const podeAdd = S.papel!=='noivos' || S.perm.convidados;
  return '<div style="display:flex;justify-content:flex-end;margin-bottom:14px;">'+((S.addOpen||!podeAdd)?'':'<button class="btn-p" onclick="toggleAdd(true)">+ Adicionar convidado</button>')+'</div>'
    +add+kpisHTML()+buscaHTML()+listaHTML();
}

function abaConfig(){
  const f=(lb,id,v,ph)=>'<div style="margin-bottom:14px;"><label style="display:block;margin-bottom:6px;font:600 9px/1 Inter,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#8F8271;">'+lb+'</label><input class="inp" id="'+id+'" value="'+esc(v||'')+'" placeholder="'+ph+'" onchange="salvarCampo(\''+id.replace('c-','')+'\',this.value)"></div>';
  return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;">'
    +'<div class="card" style="padding:22px;"><p style="margin:0 0 18px;font:400 20px/1 Fraunces,serif;color:#F5D89B;">Detalhes do evento</p>'
    +f('Casal','c-casal',S.ev.casal,'Helena & Rafael')
    +f('Data','c-data_evento',S.ev.data,'2026-11-14')
    +f('Horário','c-hora_evento',S.ev.hora,'16:00')
    +f('Local','c-local',S.ev.local,'Casa das Pedras — Itaipava, RJ')
    +(S.saved?'<p style="margin:6px 0 0;font:600 10px/1 Inter,sans-serif;letter-spacing:.1em;color:#A7D9BF;">Salvo ✓</p>':'')+'</div>'
    +'<div class="card" style="padding:22px;"><p style="margin:0 0 6px;font:400 20px/1 Fraunces,serif;color:#F5D89B;">Mensagem do convite</p>'
    +'<p style="margin:0 0 12px;font:400 12px/1.5 Inter,sans-serif;color:#8F8271;">O sistema preenche sozinho: <button onclick="inserirTag(\'{nome}\')" style="background:rgba(201,166,98,.15);border:1px solid rgba(201,166,98,.4);border-radius:3px;padding:2px 7px;color:#F5D89B;font:600 11px/1.4 Inter,monospace;cursor:pointer;">{nome}</button> vira o primeiro nome do responsável · <button onclick="inserirTag(\'{link}\')" style="background:rgba(201,166,98,.15);border:1px solid rgba(201,166,98,.4);border-radius:3px;padding:2px 7px;color:#F5D89B;font:600 11px/1.4 Inter,monospace;cursor:pointer;">{link}</button> vira o link único da família. Clique para inserir.</p>'
    +'<textarea class="inp" id="c-msg" rows="9" onchange="salvarCampo(\'mensagem_convite\',this.value)" placeholder="Olá, {nome}! ...">'+esc(S.ev.msg||'')+'</textarea>'

// ---------- disparo ----------
// intervalo entre envios (anti-bloqueio) — definido pela assessora na tela
async function dispararTodos(){
  const alvos=S.fams.filter(f=>f.pessoas.some(p=>p.st==='pendente'));
  if(!alvos.length){ alert('Não há convidados pendentes para disparar.'); return; }
  if(S.ev.status!=='ativo'||!S.ev.rsvp){ alert('O evento precisa estar ATIVO com confirmações ABERTAS. Ajuste na aba Gestão.'); return; }
  const est=estimativa(alvos.length);
  const h=new Date().getHours();
  let aviso='';
  if(h<8||h>21) aviso='\n\nATENÇÃO: disparar fora do horário comercial (8h-21h) aumenta o risco de bloqueio.';
  if(!confirm('Disparar convite para '+alvos.length+' responsável(is)?\n\nRitmo: '+S.cfg.min+'-'+S.cfg.max+'s (aleatório)\nLotes de '+S.cfg.lote+' com pausa de '+S.cfg.pausaMin+' min\nTempo estimado: '+est.txt+aviso)) return;
  S.disp={rodando:true,pausado:false,fila:alvos.map(f=>({id:f.id,nome:f.nome,tel:f.tel,estado:'espera'})),i:0,prox:0,pausaLote:0,enviadosLote:0};
  r(); loopDisparo();
}

function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function estimativa(n){
  const medio=(S.cfg.min+S.cfg.max)/2;
  const pausas=Math.max(0,Math.floor((n-1)/S.cfg.lote));
  const seg=n*medio + pausas*S.cfg.pausaMin*60;
  const min=Math.round(seg/60);
  return {min:min, txt: min<1?'menos de 1 minuto':(min<60?'cerca de '+min+' minutos':'cerca de '+(Math.floor(min/60))+'h'+(min%60?' '+(min%60)+'min':''))};
}

async function loopDisparo(){
  const d=S.disp;
  while(d.rodando && d.i<d.fila.length){
    if(d.pausado){ await new Promise(x=>setTimeout(x,500)); continue; }
    const item=d.fila[d.i];
    item.estado='enviando'; d.prox=0; r();
    try{
      const {data,error}=await sb.functions.invoke('disparar-whatsapp',{body:{responsavel_id:item.id}});
      if(error) throw error;
      item.estado = (data&&data.ok) ? 'enviado' : 'falha';
      item.erro = data&&data.erro ? data.erro : '';
    }catch(e){ item.estado='falha'; item.erro=String(e.message||e); }
    d.i++; d.enviadosLote++; r();

    if(d.i>=d.fila.length) break;

    // pausa longa entre lotes (comportamento humano)
    if(d.enviadosLote>=S.cfg.lote){
      d.enviadosLote=0;
      for(let s=S.cfg.pausaMin*60;s>0;s--){
        if(!d.rodando) return;
        if(d.pausado){ s++; } else { d.pausaLote=s; r(); }
        await new Promise(x=>setTimeout(x,1000));
      }
      d.pausaLote=0;
    }

    // intervalo ALEATÓRIO entre envios (evita padrão de robô)
    const espera=rnd(S.cfg.min,S.cfg.max);
    for(let s=espera;s>0;s--){
      if(!d.rodando) return;
      if(d.pausado){ s++; } else { d.prox=s; r(); }
      await new Promise(x=>setTimeout(x,1000));
    }
    d.prox=0;
  }
  d.rodando=false; r();
}

function pausarDisparo(v){ if(S.disp) { S.disp.pausado=v; r(); } }
function pararDisparo(){ if(S.disp){ S.disp.rodando=false; r(); } }
async function reenviar(id){
  const item=S.disp.fila.find(x=>x.id===id); if(!item) return;
  item.estado='enviando'; r();
  try{
    const {data,error}=await sb.functions.invoke('disparar-whatsapp',{body:{responsavel_id:id}});
    if(error) throw error;
    item.estado=(data&&data.ok)?'enviado':'falha'; item.erro=data&&data.erro?data.erro:'';
  }catch(e){ item.estado='falha'; item.erro=String(e.message||e); }
  r();
}

    +'<div class="card" style="padding:24px;">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><p style="margin:0;font:400 20px/1 Fraunces,serif;color:#F5D89B;">'+(d.rodando?(d.pausado?'Disparo pausado':'Enviando…'):'Disparo concluído')+'</p>'
    +'<span style="font:400 13px/1 Inter,sans-serif;color:#8F8271;">'+feitos+' de '+d.fila.length+'</span></div>'
    +'<div style="height:6px;background:rgba(201,166,98,.12);border-radius:99px;overflow:hidden;margin-bottom:10px;"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#9a7a3c,#F5D89B);transition:width .4s;"></div></div>'
    +(d.rodando&&d.pausaLote>0?'<p style="margin:0 0 14px;padding:9px 11px;background:rgba(201,166,98,.08);border-left:2px solid #C9A662;border-radius:3px;font:400 12px/1.5 Inter,sans-serif;color:#F5D89B;">Pausa entre lotes — retoma em '+Math.floor(d.pausaLote/60)+'min '+(d.pausaLote%60)+'s. Isso protege o número de bloqueio.</p>':(d.rodando&&d.prox>0?'<p style="margin:0 0 14px;font:400 12px/1 Inter,sans-serif;color:#C9A662;">Próximo envio em '+d.prox+'s (intervalo aleatório)</p>':'<div style="height:14px;"></div>'))
    +(d.rodando?'<div style="display:flex;gap:10px;margin-bottom:16px;">'+(d.pausado?'<button class="btn" onclick="pausarDisparo(false)">Retomar</button>':'<button class="btn" onclick="pausarDisparo(true)">Pausar</button>')+'<button class="btn" style="border-color:rgba(197,110,92,.4);color:#E0A294;" onclick="pararDisparo()">Parar</button></div>':'')
    +linhas+'</div>'+manual;
}

function view(){
  if(S.loading) return '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#8F8271;">Carregando…</div>';
  if(S.erro) return '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;"><p style="color:#E0A294;">'+esc(S.erro)+'</p><a class="btn" href="index.html" style="display:inline-flex;align-items:center;">← Meus eventos</a></div>';
  let abas=[['config','Configuração'],['convidados','Convidados'],['disparo','Disparo'],['painel','Painel'],['acesso','Acesso'],['gestao','Gestão']];
  if(S.papel==='noivos'){
    abas=[]; 
    if(S.perm.detalhes) abas.push(['config','Configuração']);
    if(S.perm.convidados||S.perm.painel) abas.push(['convidados','Convidados']);
    if(S.perm.disparar) abas.push(['disparo','Disparo']);
    if(S.perm.painel) abas.push(['painel','Painel']);
    abas.push(['acesso','Acesso']);
    if(!abas.some(a=>a[0]===S.aba)) S.aba=(abas[0]||['acesso'])[0];
  }
  let conteudo = S.aba==='painel'?abaPainel():S.aba==='convidados'?abaConvidados():S.aba==='config'?abaConfig():S.aba==='acesso'?abaAcesso():S.aba==='gestao'?abaGestao():S.aba==='disparo'?abaDisparo():'';
  return '<div style="max-width:1080px;margin:0 auto;padding:22px 22px 80px;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;">'
    +(S.papel==='noivos'
      ? '<span style="display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:99px;border:1px solid rgba(201,166,98,.35);background:rgba(201,166,98,.08);font:600 9px/1 Inter,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#C9A662;">Acesso dos noivos</span>'
      : '<a href="index.html" style="color:#8F8271;font:600 10px/1 Inter,sans-serif;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;">← Meus eventos</a>')
    +'<span style="font:600 11px/1 Inter,sans-serif;letter-spacing:.2em;text-transform:uppercase;color:#C9A662;">ConfirmaFest</span></div>'
    +'<p style="margin:0 0 4px;font:600 9px/1 Inter,sans-serif;letter-spacing:.22em;text-transform:uppercase;color:#8F8271;">Casamento · '+fmtD(S.ev.data)+'</p>'
    +'<h1 style="margin:0 0 4px;font:400 clamp(30px,7vw,44px)/1.1 Fraunces,serif;'+gold+'">'+esc(S.ev.casal)+'</h1>'
    +'<p style="margin:0 0 24px;font:400 13px/1.5 Inter,sans-serif;color:#8F8271;">'+esc(S.ev.local||'')+(S.ev.hora?' · '+S.ev.hora.slice(0,5):'')+' · <span style="color:#C9A662;">'+faltam(S.ev.data)+'</span></p>'
    +'<div style="display:flex;gap:22px;overflow-x:auto;border-bottom:1px solid rgba(201,166,98,.12);margin-bottom:26px;">'
    +abas.map(a=>'<button class="tab '+(S.aba===a[0]?'on':'')+'" onclick="setAba(\''+a[0]+'\')">'+a[1]+'</button>').join('')+'</div>'
    +conteudo
    +(S.papel==='noivos'?'<div style="margin-top:40px;text-align:center;"><button class="btn" onclick="sairNoivos()">Sair</button></div>':'')
    +'</div>';
}

window.setAba=a=>{S.aba=a;r();};
window.setFiltro=f=>{S.filtro=(S.filtro===f&&f!=='total')?'total':f;r();};
window.onBusca=v=>{S.busca=v;const el=document.getElementById('q');const pos=el?el.selectionStart:0;r();const n=document.getElementById('q');if(n){n.focus();n.setSelectionRange(pos,pos);}};
window.limpar=()=>{S.busca='';S.filtro='total';r();};
window.toggleAdd=v=>{S.addOpen=v;r();};
window.addConvidado=addConvidado; window.excluirFam=excluirFam; window.excluirPessoa=excluirPessoa;
window.salvarCampo=salvarCampo; window.copiar=copiar;
window.sairNoivos=async function(){ await sb.auth.signOut(); location.href='index.html'; };
window.inserirTag=function(tag){
  const t=document.getElementById('c-msg'); if(!t) return;
  const i=t.selectionStart||t.value.length;
  t.value=t.value.slice(0,i)+tag+t.value.slice(t.selectionEnd||i);
  t.focus(); t.setSelectionRange(i+tag.length,i+tag.length);
  S.ev.msg=t.value; salvarCampo('mensagem_convite',t.value);
};
window.msgPadrao=function(){
  const ev=S.ev;
  const d=ev.data?ev.data.split('-').reverse().join('/'):'';
  const hr=ev.hora?ev.hora.slice(0,5).replace(':','h'):'';
  let quando=''; if(d){ quando='Será no dia '+d+(hr?', às '+hr:'')+(ev.local?', em '+ev.local:'')+'.\n\n'; }
  const msg='Olá, {nome}! Tudo bem?\n\nVocê e sua família estão convidados para o casamento de '+(ev.casal||'')+'.\n\n'+quando+'Para nos ajudar na organização, confirme a presença de cada pessoa da sua família neste link:\n{link}\n\nÉ rápido e leva menos de 1 minuto. Contamos com vocês!';
  if(!confirm('Substituir a mensagem atual pelo texto padrão?')) return;
  S.ev.msg=msg; salvarCampo('mensagem_convite',msg); r();
};
window.setStatus=setStatus; window.setRsvp=setRsvp; window.setLimite=setLimite; window.criarAcessoNoivos=async function(){
  const nome=(document.getElementById('p-nome')||{}).value||'';
  const user=((document.getElementById('p-user')||{}).value||'').trim().toLowerCase();
  const senha=(document.getElementById('p-senha')||{}).value||'';
  if(!user){ alert('Informe o usuário de acesso dos noivos.'); return; }
  if(!/^[a-z0-9._-]{3,40}$/.test(user)){ alert('Usuário inválido.\n\nUse de 3 a 40 caracteres: letras, números, ponto, hífen ou underline.\nSem espaços e sem acentos.\n\nExemplo: helena-rafael'); return; }
  const jaTem = S.perms && S.perms.auth_user_id;
  if(!senha && !jaTem){ alert('Defina uma senha de acesso (mínimo 6 caracteres).'); return; }
  if(senha && senha.length<6){ alert('A senha precisa ter ao menos 6 caracteres.'); return; }
  if(!senha && jaTem){ alert('Deixe a senha vazia apenas se quiser manter a atual. Para só mudar permissões, use "Salvar permissões".'); return; }
  S.criando=true; r();
  try{
    const {data,error}=await sb.functions.invoke('criar-acesso-noivos',{body:{evento_id:S.ev.id,usuario:user,senha:senha,nome:nome.trim()||null}});
    if(error){
      let det=error.message||String(error);
      try{ if(error.context&&error.context.json){ const b=await error.context.json(); if(b&&b.erro) det=b.erro; } }catch(_){}
      throw new Error(det);
    }
    if(!data||!data.ok) throw new Error(data&&data.erro?data.erro:'falha desconhecida');
    S.criando=false;
    await carregarPerms(); await salvarPerms();
    alert('Acesso dos noivos criado!\n\nUsuário: '+user+'\nSenha: '+senha+'\n\nAnote e envie para o casal. Eles entram por "Sou noivo" na tela inicial.');
  }catch(e){ S.criando=false; r(); alert('Erro ao criar acesso: '+(e.message||e)); }
};
window.salvarPerms=salvarPerms; window.excluirEvento=excluirEvento;
window.setRitmo=function(k){
  const P={lento:{min:20,max:45,lote:15,pausaMin:20},seguro:{min:8,max:25,lote:20,pausaMin:15},rapido:{min:4,max:10,lote:30,pausaMin:8}};
  S.cfg=Object.assign({},P[k],{ritmo:k}); r();
};
window.setCfg=function(campo,v){ const n=parseInt(v,10); if(!isNaN(n)&&n>0){ S.cfg[campo]=n; S.cfg.ritmo='custom'; r(); } };
window.dispararTodos=dispararTodos; window.pausarDisparo=pausarDisparo; window.pararDisparo=pararDisparo; window.reenviar=reenviar;
function r(){app.innerHTML=view();}
carregar();
</script>
</body>
